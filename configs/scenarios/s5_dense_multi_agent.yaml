extends: ../default.yaml

experiment:
  name: s5_dense_multi_agent

simulation:
  steps: 220
  target_speed: 8.5

scenario:
  goal_x: 120.0
  road:
    length: 175.0
  obstacles:
    - obstacle_id: dense_static_left
      motion_model: static
      x: 30.0
      y: 2.0
      length: 4.8
      width: 2.0
    - obstacle_id: dense_static_right
      motion_model: static
      x: 32.0
      y: -2.1
      length: 4.8
      width: 2.0
    - obstacle_id: dense_cross_1
      motion_model: constant_velocity
      x: 58.0
      y: 6.5
      yaw: -1.5707963268
      speed: 2.8
      length: 4.4
      width: 1.9
    - obstacle_id: dense_cross_2
      motion_model: constant_velocity
      x: 68.0
      y: -6.0
      yaw: 1.5707963268
      speed: 2.4
      length: 4.4
      width: 1.9
    - obstacle_id: dense_slow
      motion_model: constant_velocity
      x: 78.0
      y: 0.5
      yaw: 0.0
      speed: 3.0
      length: 4.8
      width: 2.0
